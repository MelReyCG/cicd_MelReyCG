name: Manual install

on:
  workflow_dispatch:
    inputs:
      run-tests:
        type: boolean
        default: false
        required: true

  pull_request: 

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "16"

    - name: Install dependencies
      run: npm install

    - name: Build app
      run: npm run build

    - name: Unit tests
      if: ${{inputs.run-tests || github.event.pull_request}} 
      run: npm test